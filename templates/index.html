<!DOCTYPE html>
<html>
<head>
    <title>IUA Smart AI Attendance System</title>

    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
            font-weight: 700;
            font-size: 32px;
            color: #222;
        }

        /* ===================================================
           اللوقوهات
        =================================================== */
        .logos {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .logos img {
            width: 90px;
            height: auto;
            transition: 0.3s;
        }

        /* تأثير خفيف */
        .logos img:hover {
            transform: scale(1.1);
        }

        /* ===================================================
           الحاوية العامة (شكل احترافي)
        =================================================== */
        .container {
            background: white;
            width: 60%;
            margin: 40px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
        }

        .buttons {
            margin-top: 40px;
        }

        button {
            padding: 15px 35px;
            margin: 10px;
            font-size: 16px;
            border-radius: 15px;
            border: 2px solid #181f69;

            font-weight: 600;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            cursor: pointer;
            transition: 0.3s;
            background: white;
        }

        button:hover {
            transform: scale(1.05);
            background: #181f69;
            color: white;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .dashboard button {
            background-color: #181f69;
            color: white;
            width: 220px;
        }

        .dashboard button:hover {
            background: white;
            color: #181f69;
            border: 2px solid #181f69;
            transform: scale(1.05);
        }

        .dashboard button {
            background-color: #181f69;
            color: white;
            width: 220px;
        }

    </style>
</head>

<body>

<!-- ===================================================
     اللوقوهات (من static/logos)
=================================================== -->
<div class="logos">
    <img src="{{ url_for('static', filename='logos/iua-logo-vertical.png') }}">
    <img src="{{ url_for('static', filename='logos/iua-engineer-faculty-logo-transparent.png') }}">
</div>

<!-- ===================================================
     الحاوية الرئيسية
=================================================== -->
<div class="container">

    <h1>IUA Smart AI Attendance System</h1>

    <div class="buttons">

        <!-- الصف الأول -->
        <div class="row">
            <a href="/register">
                <button>Register new student</button>
            </a>

            <a href="/attendance">
                <button>Attendance</button>
            </a>
        </div>

        <!-- الصف الثاني -->
        <div class="dashboard">
            <a href="/dashboard">
                <button>Dashboard</button>
            </a>
        </div>

    </div>

</div>

</body>
</html>
