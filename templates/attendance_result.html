<!DOCTYPE html>
<html>
<head>
    <title>Attendance Result</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f4f4f4;
        }

        .box {
            margin-top: 100px;
            padding: 30px;
            background: white;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .present {
            color: green;
        }

        .already {
            color: orange;
        }

        button {
            padding: 12px 25px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">

    <!-- ===================================================
         عرض النتيجة حسب الحالة
    =================================================== -->

    {% if status == "PRESENT" %}
        <h2 class="present">✅ {{ name }} → PRESENT</h2>

    {% elif status == "ALREADY" %}
        <h2 class="already">⚠️ {{ name }} → ALREADY MARKED</h2>

    {% else %}
        <h2>❌ No result detected</h2>
    {% endif %}

    <!-- زر الرجوع -->
    <a href="/">
        <button>⬅️ Back to Home</button>
    </a>

</div>

</body>
</html>
