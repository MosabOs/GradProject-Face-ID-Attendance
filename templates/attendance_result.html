<!DOCTYPE html>
<html>
<head>
    <title>Attendance Result</title>

    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
        }

        /* ===================================================
           الحاوية الرئيسية (شكل احترافي)
        =================================================== */
        .box {
            margin-top: 100px;
            padding: 40px;
            background: white;
            display: inline-block;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
            min-width: 300px;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 20px;
        }

        .present {
            color: #28a745;
        }

        .already {
            color: #ff9800;
        }

        button {
            padding: 12px 25px;
            margin-top: 20px;
            font-size: 16px;
            border-radius: 12px;
            border: 2px solid #181f69;

            font-weight: 600;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            cursor: pointer;
            transition: 0.3s;
            background: #181f69;
            color: white;
        }

        /* ===================================================
           تأثير hover (عكس الألوان)
        =================================================== */
        button:hover {
            background: white;
            color: #181f69;
            transform: scale(1.05);
        }

    </style>
</head>
<body>

<div class="box">

    <!-- ===================================================
         عرض النتيجة حسب الحالة
    =================================================== -->

    {% if status == "PRESENT" %}
        <h2 class="present">{{ name }} → PRESENT</h2>

    {% elif status == "ALREADY" %}
        <h2 class="already">{{ name }} → ALREADY MARKED</h2>

    {% else %}
        <h2>No result detected</h2>
    {% endif %}

    <!-- زر الرجوع -->
    <a href="/">
        <button>Back to Home</button>
    </a>

</div>

</body>
</html>
