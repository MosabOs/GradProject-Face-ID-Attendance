<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f4f4f4;
        }

        .box {
            margin-top: 100px;
            padding: 30px;
            background: white;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: green;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        button {
            padding: 12px 25px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">

    <!-- رسالة النجاح -->
    <h2>✅ Student Saved Successfully</h2>

    <!-- عرض البيانات -->
    <p><strong>Name:</strong> {{ name }}</p>
    <p><strong>ID:</strong> {{ student_id }}</p>

    <!-- عرض صورة الطالب -->
    <img src="/image/{{ image_path }}" width="200">

    <br>

    <!-- زر الرجوع -->
    <a href="/">
        <button>⬅️ Back to Home</button>
    </a>

</div>

</body>
</html>
